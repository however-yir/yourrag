global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "yourrag-api"
    static_configs:
      - targets: ["host.docker.internal:9380"]
    metrics_path: "/v1/system/metrics"
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
